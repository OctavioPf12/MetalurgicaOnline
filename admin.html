<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header>
  <h2>Panel Admin</h2>
  <button onclick="logout()">Cerrar sesión</button>
</header>

<div class="login-wrapper">
  <div id="login" class="admin-login-box">
    <h3>Login</h3>
    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<div id="panel" style="display:none;">

<!-- VISTA PRODUCTOS -->
<div id="vistaProductos">

  <div class="admin-card">
    <h3>Productos</h3>

    <!-- BOTÓN AGREGAR -->
    <button onclick="mostrarFormulario()">➕ Agregar producto</button>

    <!-- FILTROS -->
    <div class="menu-filtro">
      <button onclick="cargarProductos()">Todos</button>
      <button onclick="filtrarCategoriaAdmin('sillas')">Sillas</button>
      <button onclick="filtrarCategoriaAdmin('pupitres')">Pupitres</button>
      <button onclick="filtrarCategoriaAdmin('camas')">Camas</button>
      <button onclick="filtrarCategoriaAdmin('tanques')">Tanques</button>
    </div>

    <div id="listaProductos"></div>
  </div>

</div>


<!-- VISTA FORMULARIO -->
<div id="vistaFormulario" style="display:none;">

  <div class="admin-card">
    <h3>Agregar / Editar</h3>

    <button onclick="volverProductos()">⬅ Volver</button>

<form id="formProducto">

  <input type="hidden" id="idProducto">

  <!-- NOMBRE -->
  <input type="text" id="nombre" placeholder="Nombre" required>

  <!-- DESCRIPCIÓN -->
  <input type="text" id="descripcion" placeholder="Descripción" required>

  <!-- TIPO -->
  <input type="text" id="tipo" placeholder="Tipo" required>

  <!-- CATEGORIA -->
  <input type="text" id="categoria" placeholder="Categoría" required>

  <!-- ORIGEN -->
  <input type="text" id="origen" placeholder="Origen" required>

  <!-- IMAGEN -->
 <input type="file" id="img" accept="image/*">

  <!-- FECHAS -->
  <div class="fechas">
    <input type="date" id="fecha_inicio" required>
    <input type="date" id="fecha_fin">
  </div>

  <!-- BOTÓN -->
  <button type="submit">Guardar</button>

</form>

  </div>

</div>

<script src="js/admin.js"></script>

</body>
</html>
